<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Javascript Loosely Typed</title>
</head>
<body>

  <script>

    /*
    In Java

    int x = 10;
    x = "Hello"; Error - cannot put string value in int variable
    */

    var x = 10;
    console.log(typeof x); //number
    x = "Hello";
    console.log(typeof x); // string
    x = true;
    console.log(typeof x); // boolean

    /*JavaScript var variable can accept data with any data type because it is loosely types*/

  </script>

</body>
</html>
