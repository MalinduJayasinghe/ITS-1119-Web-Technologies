<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Javascript Unary Operator</title>
</head>
<body>

  <script>

    //Unary plus (+): Converts the operand into a number
    var a = "10";
    console.log(a + 2); //102
    console.log(+a + 2); //12

    //Unary minus (+): Converts the operand into a negative value
    var b = 10;
    console.log(b); //10
    console.log(-b); //-10

    //Increment (++): Increases the value of a variable by 1
    var x = 10;
    console.log(x); //10
    x++; //x = x + 1
    console.log(x); //11

    //Decrement (--): Decreases the value of a variable by 1
    var x = 10;
    console.log(x); //10
    x--; //x = x - 1
    console.log(x); //9

    //Case 01
    var y1 = 2;
    var r1 = 10 + y1++;
    console.log(r1); // 12

    var y2 = 2;
    var r2 = 10 + ++y2;
    console.log(r2); // 13

    //Case 02
    var y3 = 2;
    var r3 = 10 + y3--;
    console.log(r3); // 12

    var y4 = 2;
    var r4 = 10 + --y4;
    console.log(r4); // 11

  </script>

</body>
</html>
