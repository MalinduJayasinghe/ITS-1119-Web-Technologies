<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Javascript Arithmetic Operators</title>
</head>
<body>
    <script>

        var a = 6;
        var b = 2;
        var c = 4;

        //Addition (+): Add 2 values together
        console.log(a + b); // 6 + 2 = 8

        //Substraction (-): Subtract one value from another
        console.log(a - b); // 6 - 2 = 4

        // Multiplication (*): Multiplies two values.
        console.log(a * b); // 6 * 2 = 12

        // Division (/): Divides one value by another.
        console.log(a / b); // 6 / 2 = 3

        // Modulus (%): Returns the remainder of the division.
        console.log(a % b); // 6 % 2 = 0
        console.log(a % c); // 6 % 4 = 2

    </script>
</body>
</html>
