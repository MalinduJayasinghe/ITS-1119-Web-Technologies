<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Javascript Console</title>
</head>
<body>

  <script>

    /*The console allows the user to interact with the debugging console*/

    var x = 10;
    console.log(x); // displays the required data
    console.error(x); //displays the required data with an error icon
    console.warn(x); //displays the required data with a warning icon
    console.info(x); // displays the required data with an info icon
    // console.clear(); // clears the entire console

    x = [{key: 1, value: "Sri Lanka"}, {key: 2, value: "India"}, {key: 3, value: "China"}];
    console.table(x); // displays data as a table

  </script>

</body>
</html>
