<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Javasript Dynamically Typed</title>
</head>
<body>

  <script>

    /*
      In Java
      =======
      int x = 10;
      x = "Hello";
    */
    var x = 10; // number
    console.log(typeof x);
    x = "Hello"; // string
    console.log(typeof x);
    x = true; // boolean
    console.log(typeof x);

  </script>

</body>
</html>
