<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JavaScript Variables Part 04</title>
</head>
<body>

<script>

  var a = 10;
  let b = 20;
  const c = 30;

  console.log(a);
  console.log(b);
  console.log(c);

  a = 100;
  b = 200;
  c = 300;
  // Error: Assignment to constant variable.
  // Const variable can only have a value assigned to it once.

  console.log(a);
  console.log(b);
  console.log(c);


</script>

<script src="../script.js"></script>

</body>
</html>
