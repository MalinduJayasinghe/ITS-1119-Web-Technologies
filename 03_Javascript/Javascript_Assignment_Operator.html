<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Javascript Assignment Operator</title>
</head>
<body>

    <script>

        var a = 6;
        var b = 2;
        var c = 3;

        //Assignment (=): Assigns a value to a variable
        var c = a;
        console.log(c);

        //Addition Assignment (+=): Adds a value from a variable and assigns the result to the variable
        a += b;

        //Substraction Assignment (-=): Subtracts a value from a variable and assigns the result to the variable
        a -= b;

        //Multiplication Assignment (*=): Multiplies a value from a variable and assigns the result to the variable
        a *= b;

        //Division Assignment (/=): Divides a value from a variable and assigns the result to the variable
        a /= b;

        //Modulus Assignment (-=): Calculates the remainder of a variable and assigns the result to the variable
        a %= b;

    </script>

</body>
</html>
