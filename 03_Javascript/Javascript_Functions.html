    /* Arrow Functions */
    const myFunction = () => {
      console.log("Hello World!");
    }
    myFunction();


    const findSum = (num1, num2) => {
      console.log(num1 + num2);
    }
    findSum(10, 20);


    const findMul = (num1, num2) => {
      return num1 * num2;
    }
    var result = findMul(10, 20);
