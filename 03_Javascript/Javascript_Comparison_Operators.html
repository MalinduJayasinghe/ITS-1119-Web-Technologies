<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Javascript Comparison Operators</title>
</head>
<body>

  <script>

    var a = 10;
    var b = 10;
    var c = 6;
    var d = "10";

    //Equality (==): Checks if two values are equal. Regardless of data type
    console.log(a == b); //true
    console.log(a == c); //false
    console.log(a == d); //true

    //Inequality (!=): Checks if two values are not equal.
    console.log(a != b); //false
    console.log(a != c); //true
    console.log(a != d); //false

    //Strict Equality (===): Checks if two values are equal in value and data type.
    console.log(a === b); //true
    console.log(a === c); //false
    console.log(a === d); //false

    //Strict Inequality (!==): Checks if two values are not equal in value and data type.
    console.log(a !== b); //false
    console.log(a !== c); //true
    console.log(a !== d); //true

    //Greater Than (>): Checks if one value is greater than the other
    console.log(a > b); //false
    console.log(a > c); //true
    console.log(a > d); //false

    //Less Than (<): Checks if one value is smaller than the other
    console.log(a < b); //false
    console.log(a < c); //false
    console.log(a < d); //false

    //Greater Than Or Equal (>=): Checks if one value is greater or equal to the other
    console.log(a >= b); //true
    console.log(a >= c); //true
    console.log(a >= d); //true

    //Less Than Or Equal (<=): Checks if one value is smaller than or equal to the other
    console.log(a <= b); //true
    console.log(a <= c); //false
    console.log(a <= d); //true

  </script>

</body>
</html>
