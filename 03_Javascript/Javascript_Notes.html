<!--
    JavaScript is so important today because you can't build interactive websites without it.

    It is used for both client-side and server-side developments.

    JavaScript frameworks like React Native and Ionic allow you to develop cross-platform applications.

    JavaScript is a high-level, interpreted programming language used primarily to create interactive web pages
    and is one of the core technologies of the web, alongside HTML (for structure) and CSS (for styling).

    In 1994, a company called Mosaic Corporation released their browser called Netscape 0.9.

    They wanted to make a unique browser with interactivity.

    The software was first called Mocha, but was later renamed as Livescript.

    Livescript was later renamed JavaScript to catch the attention of the population, as Java and Java
    developers were widespread at the time.

    Due to JavaScript, the Mosaic Corporation massively increases its sales and market shares, becoming a
    massive corporation.

    In response to the release of JavaScript, Microsoft creates its own software called Jscript and releases it
    with their IE 3.0 browser.

    In 1996, Jscript was further improved by Microsoft and a new software called VBScript

    Due to the problems created by multiple different similar pieces of software existing for each browser, so the major
    companies form a committee called ECMA to ensure only one such software exists.

    JavaScript was submitted to the ECMA Committee in 1996.

    It was renamed again to ECMAScript, but it was still referred to as JavaScript by developers.

    ECMAScript Version 1 was released in 1997.

    In 2008, Netscape Navigator was officially ended.
-->

    JS is a prototype-based, loosely typed, dynamic scripting language, supporting object-oriented, functional
    programming styles.

    JavaScript was created by Brendan Eich in 1995 in 10 days.
