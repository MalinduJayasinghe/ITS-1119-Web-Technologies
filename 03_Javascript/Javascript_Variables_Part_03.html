<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JavaScript Variables Part 03</title>
</head>
<body>

<script>

  {
    var a = 20;
    let b = 30;
    const c = 40;
    console.log(a);
    console.log(b);
    console.log(c);
  }

  console.log(a);
  console.log(b); // Error: b is not defined
  console.log(c); // Error: c is not defined

</script>

</body>
</html>
