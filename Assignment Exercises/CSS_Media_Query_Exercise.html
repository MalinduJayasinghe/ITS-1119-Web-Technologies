<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Query</title>

    <link rel="stylesheet" href="../Assets/lib/normalize.css">

    <style>

        header {
            width: 100vw;
            height: 80px;
            box-shadow: rgba(100, 100, 111, 0.2) 0px 7px 29px 0px;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 10px;
            font-size: 30px;
        }

        header > nav {
            height: fit-content;
            align-self: center;
        }

        header > nav > a {
            text-decoration: none;
            font-family: "Agency FB", sans-serif;
            margin: 0px 10px;
        }

        #mobile-nav{
            display: none;
        }

        @media all and (max-width: 600px) {
            #mobile-nav{
                display: block;
            }

            #desktop-nav{
                display: none;
            }
        }
    </style>

</head>
<body>

<header>
    <img src="../Assets/files/images/logo.png" title="logo" alt="logo" width="200">
    <nav id = "desktop-nav">
        <a href="">Home</a>
        <a href="">About</a>
        <a href="">Services</a>
        <a href="">Contact Us</a>
    </nav>
    <nav id = "mobile-nav">
        <img src="../Assets/files/images/MenuIcon.ico">
    </nav>
</header>

</body>
</html>
