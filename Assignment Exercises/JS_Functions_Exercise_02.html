    /* //////////////////////////// Arrow Functions //////////////////////////// */

    const findFactorial = (num) => {

      var fact = 1;
      for ( var i = num; i > 0; i--){

        fact = fact * i;
      }
      console.log("Factorial of " + num + ":", fact );
      return fact;
    }

    findFactorial(5);

  </script>
