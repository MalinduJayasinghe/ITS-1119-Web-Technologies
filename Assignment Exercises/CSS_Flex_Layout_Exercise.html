<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flex Layout Exercise</title>

  <style>

    section{
      width: 1000px;
      height: 300px;
      border: 5px solid red;
      display: flex;

      justify-content: space-evenly;
    }

    section > div{
      width: 100px;
      height: 100px;
      background-color: deeppink;

      box-shadow: 0px 0px 20px 0px deeppink;
    }

    section > div:nth-child(2){
      align-self: center;
    }

    section > div:nth-child(3){
      align-self: end;
    }

    section > div:nth-child(4){
      align-self: center;
    }

    section > div:nth-child(6){
      align-self: center;
    }

  </style>

</head>
<body>

    <section>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </section>

</body>
</html>
