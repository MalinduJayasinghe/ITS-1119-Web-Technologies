<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="keywords" content="web, html, css, javascript, js, java, python">
  <meta name="description" content="World best web development tutorials">
  <meta name="author" content="IJSE">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Z Index</title>
  <link rel="stylesheet" href="../Assets/lib/normalize.css">

  <style>

    div{
      position: absolute;
    }

    #div1{
      width: 400px;
      height: 400px;
      background: red;

      z-index: 3;
    }

    #div2{
      width: 300px;
      height: 300px;
      background: orangered;

      z-index: 2;
    }

    #div3{
      width: 200px;
      height: 200px;
      background: orange;

      z-index: 1;
    }

    #div4{
      width: 100px;
      height: 100px;
      background: yellow;
    }

    /*z-index min value = −2,147,483,648*/
    /*z-index max value = 2,147,483,647*/
    /*z-index: calc(infinity); /*method to get the maximum amount specified in any browser*/

  </style>
</head>
<body>

<div id="div1"></div>
<div id="div2"></div>
<div id="div3"></div>
<div id="div4"></div>

</body>
</html>
