<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Box Sizing</title>
    <link rel="stylesheet" href="../Assets/lib/normalize.css">

    <style>

        div{
            width: 400px;
            height: 200px;
            background-color: deepskyblue;
            margin-bottom: 10px;
        }

        #div1{
            border: 10px solid darkblue;
            box-sizing: border-box; /* The default value is content box*/
            /* border box ensures the box remains at the same width and height even if things like borders are added */
        }

    </style>
</head>
<body>

    <div id = "div1"></div>
    <div id = "div2"></div>

</body>
