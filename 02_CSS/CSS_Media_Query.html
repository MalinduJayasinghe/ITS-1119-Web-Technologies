<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Media Query</title>

    <link rel="stylesheet" href= "../Assets/lib/normalize.css">

    <style>

        h1{
            color: red;
        }

        @media all and (max-width: 800px){
            /*@media has all, screen, print, speech and other functions as well*/
            /*the screen function can change the CSS styling at the moment the file is opened at the beginning*/
            /*The print function makes it si that we can set the code/document to be changed if it was being printed*/
            /*Media queries must be written at the bottom of the CSS document*/
            /*the 'and' is called a component connector*/
            /*the content within () is called the media feature*/
            h1{
                color: yellowgreen;
            }
        }

    </style>
</head>
<body>

    <h1>Hello World!</h1>

</body>
</html>
