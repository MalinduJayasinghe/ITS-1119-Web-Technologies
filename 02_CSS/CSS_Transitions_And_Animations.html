<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Transitions and Animations</title>
</head>
<body>

  <!--
    In CSS Transitions, the involvement of the user is necessary (Ex - clicking on the screen).
    In CSS Animations, the involvement of the user is not necessary, they execute according to their preset rules.
  -->

  <!--
    CSS Transitions smoothly change the style of an element ovr a specified duration when a certain condition
    is met, such as hovering over or clicking the element.
  -->

  <!--
    CSS Animations allow for dynamic movement and style changes of an element by defining keyframes that specify
    the intermediate styles at various points during the animation's
  -->

</body>
