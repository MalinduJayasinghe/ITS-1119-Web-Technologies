<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Animations</title>

    <link rel="stylesheet" href= "../Assets/lib/normalize.css">

    <style>

        div{
            width: 200px;
            aspect-ratio: 1 / 1;
            background: yellow;
            border: 4px solid black;

            animation-name: myanimation;

            animation-duration: 10000ms;
            animation-delay: 250ms;
            animation-timing-function: ease-in;
            /*ease-in = animation starts slow and ends quickly*/
            /*ease-out = animation starts quickly but ends slowly*/
            /*ease-in-out = animation starts slowly and speeds up but also ends slowly*/
            /*linear = entire animation runs at the same speed*/
            animation-iteration-count: infinite;
            animation-direction: alternate;
            /*animation-direction needs an animation-iteration-count more than 1 in order to work*/
            /*normal (default)*/
            /*alternate - alternate direction for each separate animation*/
            /*reverse - starts animation in reverse of the specified direction*/
            /*alternate-reverse*/
        }

        @keyframes myanimation { /* myanimation = animation name */
            /*Keyframe 01*/
            from {
                background: pink;
            /*Keyframe 02*/
            }to {
                background: red;
            }
        }

    </style>
</head>
<body>

    <div></div>

</body>
</html>
