<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="keywords" content="web, html, css, javascript, js, java, python">
  <meta name="description" content="World best web development tutorials">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CSS Media Query Part 02</title>

  <link rel="stylesheet" href= "../Assets/lib/normalize.css">

  <style>

    div{
      width: 200px;
      aspect-ratio: 1 / 1;
      background-color: pink;
      border: 2px solid red;
    }

    @media all and (max-width: 800px) {
      div{
        background-color: deeppink;
        border-radius: 100%;
      }
    }

    @media all and (min-width: 800px) {
      div{
        background-color: deeppink;
        border-radius: 100%;
      }
    }

    @media all and (min-width: 800px) and (max-width: 1000px) {
      div{
        background-color: deeppink;
        border-radius: 100%;
      }
    }
    /*max-width only applies if the size of the viewport(screen) is less than or equal to the given size*/
    /*min-width only applies if the size of the viewport(screen) is greater than or equal to the given size*/
    /*You can use and, or and not operators to set multiple conditions for a Media Query*/

  </style>
</head>
<body>

  <div></div>

</body>
</html>
