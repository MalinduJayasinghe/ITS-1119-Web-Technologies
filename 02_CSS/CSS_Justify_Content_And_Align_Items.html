    <title>CSS Justify Content and Align Items</title>
    <link rel="stylesheet" href="../Assets/lib/normalize.css">

    <style>

        section{
            width: 500px;
            height: 300px;
            border: 2px solid orange;

            display: flex;

            /* /////////////////// center from horizontal position /////////////////// */
            justify-content: center;
            /*justify-content: start;*/
            /*justify-items: right;*/

            /* /////////////////// center from vertical position /////////////////// */
            align-items: center;
            /*align-items: start;*/
            /*align-items: end;*/
        }

        section > div{
            width: 100px;
            height: 100px;
            background-color: red;
        }

    </style>
</head>

        <section>
            <div></div>
        </section>
